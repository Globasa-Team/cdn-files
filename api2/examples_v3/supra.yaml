- text: Daymo sexinloypul, mi le preporta kursi cel in kamer ji le teyan ki ete am
    sidecu ji laxocu, durki mi, fe na ganjoncu triunfapul, le plasi misu kursi supra
    to hu denloka morjismu de korbani le leta.
