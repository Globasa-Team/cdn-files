- text: Moy haki ji huruya hu da bedingya in hin deklara deya moy insan, wal he banpul
    aloyagi, kama fol rasa, pifuli kolor, jensi, basa, dini, politili or alo ijen,
    nasyonli or sosyal asel, kam ekonomili, xenculi or alo jotay.
