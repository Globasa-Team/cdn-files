---
- text: "Ete soho loga tas se, \u201CAm ata, imi am fale ituka, ji imi atex oto finfe
    na sen jumbi.\u201D"
  cite:
    text:
      eng: 'Doxo: Ruhologili Literatur'
      spa: 'Doxo: Ruhologili Literatur'
    link:
      eng: https://doxo.globasa.net/eng/historili-doku/ruhologili-literatur
      spa: https://doxo.globasa.net/spa/historili-doku/ruhologili-literatur
  translations:
  - text: Ete
    eng: 'ete (pn) pron (animate): they, them'
    spa: ete (pn) ellos (seres vivos y objetos personificados), ellas, elles
  - text: ' '
  - text: soho
    eng: 'soho (t) adj: reciprocal, mutual; adv: reciprocally, mutually, each other'
    spa: soho (t) rec&iacute;proco, inter-; rec&iacute;procamente, uno al otro
  - text: ' '
  - text: loga
    eng: 'loga (b.oj) n: statement, utterance; v.tr: say, tell, state, utter'
    spa: loga (b.oj) declaraci&oacute;n, enunciaci&oacute;n; decir, declarar, enunciar
  - text: ' '
  - text: tas
    eng: 'tas (p) prep: to (indirect object marker), for (receiver/recipient)'
    spa: tas (p) a (marcador del objeto indirecto), para (receptor)
  - text: ' '
  - text: se
    eng: 'se (pn) pron (reflexive): myself, yourself, herself, himself, themself,
      itself, themselves, ourselves, yourselves'
    spa: se (pn) se (pronombre reflexivo), me, te, nos, os, a s&iacute; mismo, &eacute;l
      mismo
  - text: ", \u201C"
  - text: Am
    eng: 'am (par) par (imperative verb marker): (do)'
    spa: am (par) -a (marcador de los modos imperativo y yusivo), -e, que, sea
  - text: ' '
  - text: ata
    eng: 'ata (b.nenoj) n: coming; v.intr: come'
    spa: ata (b.nenoj) venida; venir
  - text: ', '
  - text: imi
    eng: 'imi (pn) pron: we, us'
    spa: imi (pn) nosotros
  - text: ' '
  - text: am
    eng: 'am (par) par (imperative verb marker): (do)'
    spa: am (par) -a (marcador de los modos imperativo y yusivo), -e, que, sea
  - text: ' '
  - text: fale
    eng: 'fale (b.oj) n: deed, act; v.tr: do, make, perform'
    spa: fale (b.oj) hecho, acto; hacer
  - text: ' '
  - text: ituka
    eng: 'ituka (b) n: brick'
    spa: ituka (b) ladrillo
  - text: ', '
  - text: ji
    eng: 'ji (l) conj: and, as well as'
    spa: ji (l) y, e, et, &amp;
  - text: ' '
  - text: imi
    eng: 'imi (pn) pron: we, us'
    spa: imi (pn) nosotros
  - text: ' '
  - text: atex
    eng: 'atex (b.oro) n: fire; v.tr: burn (damage, destroy or consume with fire);
      v.intr (optional -cu): burn (be on fire, be damaged, destroyed or consumed by
      fire)'
    spa: atex (b.oro) fuego, lumbre; incendiar; arder, incendiarse
  - text: ' '
  - text: oto
    eng: 'oto (pn) pron (inanimate): they, them'
    spa: oto (pn) ellos (cosas)
  - text: ' '
  - text: finfe
    eng: 'finfe (p) prep: until (+ noun), to (xorfe... finfe...)'
    spa: finfe (p) hasta, terminando (en)
  - text: ' '
  - text: na
    eng: 'na (par) par (infinitive marker): to'
    spa: na (par) -(a)r (marcador del infinitivo), -er, -ir, para
  - text: ' '
  - text: sen
    eng: 'sen (b.lin) n: being (existence); v.cop: be'
    spa: sen (b.lin) ser; ser, estar
  - text: ' '
  - text: jumbi
